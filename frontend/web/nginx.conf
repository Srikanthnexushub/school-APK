server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --------------------------------------------------------------------------
    # Security headers
    # --------------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --------------------------------------------------------------------------
    # Gzip
    # --------------------------------------------------------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;

    # --------------------------------------------------------------------------
    # Student-gateway routes (8089) — must be listed BEFORE the /api catch-all
    # --------------------------------------------------------------------------
    location ~ ^/api/v1/(students|exam-tracker|performance|doubts|recommendations|study-plans|career-profiles|career-recommendations|college-predictions|mentors|mentor-sessions)(/|$) {
        proxy_pass         http://student-gateway:8089;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # --------------------------------------------------------------------------
    # API-gateway catch-all (8180) — auth, parent, center, assess, ai, psych
    # --------------------------------------------------------------------------
    location /api/ {
        proxy_pass         http://api-gateway:8180;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # --------------------------------------------------------------------------
    # SPA fallback — all unknown routes serve index.html (React Router)
    # --------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
