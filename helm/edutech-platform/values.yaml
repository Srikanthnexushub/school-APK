    port: 8085
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    hpa:
      enabled: false

  studentProfileSvc:
    replicas: 1
    port: 8090
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    hpa:
      enabled: false

  examTrackerSvc:
    replicas: 1
    port: 8091
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    hpa:
      enabled: false

  performanceSvc:
    replicas: 1
    port: 8092
    grpcPort: 9094
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    hpa:
      enabled: false

  aiMentorSvc:
    replicas: 1
