        memory: "256Mi"
        cpu: "200m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    hpa:
      enabled: false

# Ingress configuration
ingress:
  enabled: true
  className: nginx
  apiGateway:
    host: ""           # REQUIRED: e.g. api.yourdomain.com
    tls: true
    tlsSecretName: ""  # REQUIRED if tls=true
  studentGateway:
    host: ""           # REQUIRED: e.g. student-api.yourdomain.com
    tls: true
    tlsSecretName: ""  # REQUIRED if tls=true

# Monitoring
monitoring:
  prometheus:
    enabled: true
    scrapeInterval: "15s"
  serviceMonitor:
    enabled: false   # Requires prometheus-operator CRDs
    namespace: monitoring

# Network policies
networkPolicy:
  enabled: true
