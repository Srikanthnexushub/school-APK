apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: {{ .Values.namespace }}
  labels:
    {{ include "edutech.labels" . | nindent 4 }}
    {{ include "edutech.selectorLabels" (dict "app" "api-gateway") | nindent 4 }}
spec:
  selector:
    {{ include "edutech.selectorLabels" (dict "app" "api-gateway") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.services.apiGateway.port }}
      targetPort: {{ .Values.services.apiGateway.port }}
      protocol: TCP
  type: ClusterIP
