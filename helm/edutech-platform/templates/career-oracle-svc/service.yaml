apiVersion: v1
kind: Service
metadata:
  name: career-oracle-svc
  namespace: {{ .Values.namespace }}
  labels:
    {{ include "edutech.labels" . | nindent 4 }}
    {{ include "edutech.selectorLabels" (dict "app" "career-oracle-svc") | nindent 4 }}
spec:
  selector:
    {{ include "edutech.selectorLabels" (dict "app" "career-oracle-svc") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.services.careerOracleSvc.port }}
      targetPort: {{ .Values.services.careerOracleSvc.port }}
      protocol: TCP
    - name: grpc
      port: {{ .Values.services.careerOracleSvc.grpcPort }}
      targetPort: {{ .Values.services.careerOracleSvc.grpcPort }}
      protocol: TCP
  type: ClusterIP
