# =============================================================================
# EduTech AI Platform — Local Development Docker Compose
# =============================================================================
# Prerequisites: copy .env.example to .env and fill all values
# Usage:
#   docker compose --env-file ../../.env up -d
#   docker compose --env-file ../../.env down -v   (removes volumes too)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 with pgvector + TimescaleDB extensions
  # Single instance, multiple schemas (one per service via RLS)
  # ---------------------------------------------------------------------------
  postgres:
    image: timescale/timescaledb-ha:pg16-latest
    container_name: edutech-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_ROOT_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/home/postgres/pgdata/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ROOT_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - edutech-network

  # ---------------------------------------------------------------------------
  # Redis 7 (single node for local dev — production uses Redis Cluster)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: edutech-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - edutech-network

  # ---------------------------------------------------------------------------
  # Kafka 3.6 — KRaft mode (no ZooKeeper)
  # ---------------------------------------------------------------------------
  kafka:
    image: bitnami/kafka:3.6
    container_name: edutech-kafka
    restart: unless-stopped
    environment:
      # KRaft configuration
      KAFKA_CFG_NODE_ID: ${KAFKA_NODE_ID}
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: ${KAFKA_CONTROLLER_QUORUM_VOTERS}
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:${KAFKA_EXTERNAL_PORT}
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Topic defaults
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: ${KAFKA_AUTO_CREATE_TOPICS}
      KAFKA_CFG_NUM_PARTITIONS: ${KAFKA_DEFAULT_PARTITIONS}
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: ${KAFKA_DEFAULT_REPLICATION_FACTOR}
      KAFKA_CFG_LOG_RETENTION_HOURS: ${KAFKA_LOG_RETENTION_HOURS}
    ports:
      - "${KAFKA_EXTERNAL_PORT}:9092"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - edutech-network

  # ---------------------------------------------------------------------------
  # Kafka UI — browser-based topic/consumer group management (dev only)
  # ---------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: edutech-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: ${KAFKA_UI_CLUSTER_NAME}
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "${KAFKA_UI_PORT}:8080"
    networks:
      - edutech-network

  # ---------------------------------------------------------------------------
  # pgAdmin — PostgreSQL GUI (dev only)
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: edutech-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    networks:
      - edutech-network

  # ---------------------------------------------------------------------------
  # Redis Commander — Redis GUI (dev only)
  # ---------------------------------------------------------------------------
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: edutech-redis-commander
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD}
    ports:
      - "${REDIS_COMMANDER_PORT}:8081"
    networks:
      - edutech-network

volumes:
  postgres-data:
    name: edutech-postgres-data
  redis-data:
    name: edutech-redis-data
  kafka-data:
    name: edutech-kafka-data

networks:
  edutech-network:
    name: edutech-network
    driver: bridge
