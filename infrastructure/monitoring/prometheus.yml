global:
  scrape_interval: ${PROMETHEUS_SCRAPE_INTERVAL:-15s}
  evaluation_interval: ${PROMETHEUS_EVAL_INTERVAL:-15s}
  external_labels:
    environment: ${APP_ENVIRONMENT}
    platform: edutech-ai

scrape_configs:
  # Prometheus self-scrape
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # -------------------------------------------------------------------------
  # Java microservices — Spring Boot Actuator /actuator/prometheus
  # Targets use Docker DNS names matching service names in docker-compose
  # -------------------------------------------------------------------------
  - job_name: auth-svc
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['auth-svc:${AUTH_SVC_PORT}']
        labels:
          service: auth-svc
          layer: identity

  - job_name: center-svc
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['center-svc:${CENTER_SVC_PORT}']
        labels:
          service: center-svc
          layer: core

  - job_name: parent-svc
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['parent-svc:${PARENT_SVC_PORT}']
        labels:
          service: parent-svc
          layer: core

  - job_name: assess-svc
