# =============================================================================
# EduTech AI Platform — Monitoring Stack
#
# Usage (overlay with dev infra):
#   docker compose \
#     -f infrastructure/docker/docker-compose.dev.yml \
#     -f infrastructure/monitoring/docker-compose.monitoring.yml \
#     --env-file .env up -d
# =============================================================================
services:

  prometheus:
    image: prom/prometheus:latest
    container_name: edutech-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"
    networks:
      - edutech-network
    environment:
      - APP_ENVIRONMENT=${APP_ENVIRONMENT}

  grafana:
    image: grafana/grafana:latest
    container_name: edutech-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL}
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_PORT}:3000"
    networks:
      - edutech-network
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: edutech-jaeger
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "${JAEGER_UI_PORT}:16686"
      - "${JAEGER_OTLP_GRPC_PORT}:4317"
      - "${JAEGER_OTLP_HTTP_PORT}:4318"
    networks:
      - edutech-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: edutech-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT}:1025"
      - "${MAILHOG_UI_PORT}:8025"
    networks:
      - edutech-network

volumes:
  prometheus-data:
    name: edutech-prometheus-data
  grafana-data:
    name: edutech-grafana-data

networks:
  edutech-network:
    external: true
    name: edutech-network
