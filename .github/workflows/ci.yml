name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '21'
  REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
  IMAGE_PREFIX: ${{ secrets.DOCKER_IMAGE_PREFIX }}

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build and test all Java services in parallel
  # ---------------------------------------------------------------------------
  test-java:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-svc
          - center-svc
          - parent-svc
          - assess-svc
          - psych-svc
          - ai-gateway-svc
          - api-gateway
          - student-profile-svc
          - exam-tracker-svc
          - performance-svc
          - ai-mentor-svc
          - career-oracle-svc
          - mentor-svc
          - student-gateway
      fail-fast: false
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: ${{ secrets.CI_DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      kafka:
        image: apache/kafka:latest
        ports:
          - 9092:9094
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Test ${{ matrix.service }}
        run: mvn test -pl services/${{ matrix.service }} --also-make --no-transfer-progress
        env:
          # Testcontainers re-use mode — avoids re-spinning containers per test class
          CI: true
          TESTCONTAINERS_REUSE_ENABLE: true

  # ---------------------------------------------------------------------------
  # Job 2: Frontend TypeScript type check
  # ---------------------------------------------------------------------------
  test-frontend:
    name: Frontend TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit

  # ---------------------------------------------------------------------------
  # Job 3: OWASP dependency vulnerability check
  # ---------------------------------------------------------------------------
  owasp-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: OWASP Dependency Check
        run: mvn org.owasp:dependency-check-maven:check --no-transfer-progress
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: '**/dependency-check-report.html'

  # ---------------------------------------------------------------------------
  # Job 4: Build and push Docker images (main branch only)
  # ---------------------------------------------------------------------------
  build-images:
    name: Build ${{ matrix.service }} image
    runs-on: ubuntu-latest
    needs: [test-java, test-frontend]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - auth-svc
          - center-svc
          - parent-svc
          - assess-svc
          - psych-svc
          - ai-gateway-svc
          - api-gateway
          - student-profile-svc
          - exam-tracker-svc
          - performance-svc
          - ai-mentor-svc
          - career-oracle-svc
          - mentor-svc
          - student-gateway
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=1.0.0-SNAPSHOT
            SVC_NAME=${{ matrix.service }}
