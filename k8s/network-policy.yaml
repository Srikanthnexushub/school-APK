---
# Policy 1: Backend EduPath services — only accept traffic from student-gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: edupath-backend-policy
  namespace: edutech
  labels:
    app.kubernetes.io/part-of: edutech-platform
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - student-profile-svc
          - exam-tracker-svc
          - performance-svc
          - ai-mentor-svc
          - career-oracle-svc
          - mentor-svc
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: student-gateway
---
# Policy 2: Core backend services — only accept traffic from api-gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: core-backend-policy
  namespace: edutech
  labels:
    app.kubernetes.io/part-of: edutech-platform
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - auth-svc
          - center-svc
          - parent-svc
          - assess-svc
          - psych-svc
          - ai-gateway-svc
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
---
# Policy 3: Allow Prometheus scraping from monitoring namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: edutech
  labels:
    app.kubernetes.io/part-of: edutech-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8082
        - protocol: TCP
          port: 8083
        - protocol: TCP
          port: 8084
        - protocol: TCP
          port: 8085
        - protocol: TCP
          port: 8086
        - protocol: TCP
          port: 8087
        - protocol: TCP
          port: 8088
        - protocol: TCP
          port: 8089
        - protocol: TCP
          port: 8090
        - protocol: TCP
          port: 8091
        - protocol: TCP
          port: 8092
        - protocol: TCP
          port: 8093
        - protocol: TCP
          port: 8180
        - protocol: TCP
          port: 8182
