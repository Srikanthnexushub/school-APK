apiVersion: v1
kind: Service
metadata:
  name: ai-mentor-svc
  namespace: edutech
  labels:
    app: ai-mentor-svc
    app.kubernetes.io/name: ai-mentor-svc
    app.kubernetes.io/part-of: edutech-platform
spec:
  selector:
    app: ai-mentor-svc
  ports:
    - name: http
      port: 8093
      targetPort: 8093
      protocol: TCP
    - name: grpc
      port: 9096
      targetPort: 9096
      protocol: TCP
  type: ClusterIP
