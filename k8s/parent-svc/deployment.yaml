apiVersion: apps/v1
kind: Deployment
metadata:
  name: parent-svc
  namespace: edutech
  labels:
    app: parent-svc
    app.kubernetes.io/name: parent-svc
    app.kubernetes.io/part-of: edutech-platform
    app.kubernetes.io/component: service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parent-svc
  template:
    metadata:
      labels:
        app: parent-svc
        app.kubernetes.io/name: parent-svc
        app.kubernetes.io/part-of: edutech-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: parent-svc
          image: "$(DOCKER_REGISTRY)/$(DOCKER_IMAGE_PREFIX)/parent-svc:$(IMAGE_TAG)"
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: edutech-common-config
            - secretRef:
                name: edutech-secrets
          env:
            - name: SERVER_PORT
              value: "8082"
            - name: PARENT_SVC_PORT
              value: "8082"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      imagePullSecrets:
        - name: registry-credentials
