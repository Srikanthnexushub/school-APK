spring:
  application:
    name: assess-svc-test

  # Datasource — overridden by @DynamicPropertySource in IT classes
  datasource:
    url: jdbc:postgresql://localhost:5432/test
    username: test
    password: test
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 10000
      idle-timeout: 30000

  jpa:
    open-in-view: false
    properties:
      hibernate:
        default_schema: assess_schema
        jdbc:
          time_zone: UTC

  flyway:
    schemas: assess_schema
    locations: classpath:db/migration/assess
    baseline-on-migrate: false
    placeholder-replacement: false

  # Disable Redis auto-configuration for tests
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  # Kafka — bootstrap points to a non-existent address; listener auto-startup is disabled
  kafka:
    bootstrap-servers: localhost:9999
    consumer:
      group-id: assess-svc-test-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    listener:
      auto-startup: false

# gRPC server — port -1 = in-process server (no TCP socket binding) for tests
grpc:
  server:
    port: -1

# JWT — point to a non-existent file; JwtTokenValidator is mocked in IT tests
jwt:
  public-key-path: classpath:test-public-key.pem
  issuer: test-issuer

# pgvector — dimensions for the test container
pgvector:
  embedding-dimensions: 1536

# AI gateway — disabled in tests
ai-gateway:
  base-url: http://localhost:9999

# CAT engine — minimal config for tests
cat:
  min-questions: 3
  max-questions: 10
  initial-theta: 0.0
  convergence-threshold: 0.01

# Kafka topics — non-null placeholders (Kafka is mocked)
kafka:
  topics:
    assess-events: assess-events-test
    center-events: center-events-test
    audit-immutable: audit-test
    notification-send: notification-send-test

resilience4j:
  circuitbreaker:
    instances:
      ai-gateway:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 0.0

otel:
  exporter:
    otlp:
      endpoint: http://localhost:4317

logging:
  level:
    root: WARN
    com.edutech: DEBUG
    org.flywaydb: DEBUG

springdoc:
  api-docs:
    path: /api-docs
