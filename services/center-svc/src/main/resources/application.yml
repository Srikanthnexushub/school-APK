spring:
  application:
    name: ${CENTER_SVC_NAME}
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${CENTER_SVC_DB_NAME}
    username: ${CENTER_SVC_DB_USERNAME}
    password: ${CENTER_SVC_DB_PASSWORD}
    hikari:
      pool-name: center-svc-pool
      maximum-pool-size: ${CENTER_SVC_DB_POOL_MAX_SIZE}
      minimum-idle: ${CENTER_SVC_DB_POOL_MIN_IDLE}
      connection-timeout: ${CENTER_SVC_DB_CONNECTION_TIMEOUT_MS}
      idle-timeout: ${CENTER_SVC_DB_IDLE_TIMEOUT_MS}

  jpa:
    open-in-view: false
    properties:
      hibernate:
        default_schema: center_schema
        jdbc:
          time_zone: UTC

  flyway:
    schemas: center_schema
    locations: classpath:db/migration/center
    baseline-on-migrate: false
    placeholder-replacement: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: ${REDIS_SSL_ENABLED}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: ${CENTER_SVC_KAFKA_CONSUMER_GROUP}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

server:
  port: ${CENTER_SVC_PORT}
  shutdown: graceful

jwt:
  public-key-path: ${JWT_PUBLIC_KEY_PATH}
  issuer: ${JWT_ISSUER}

kafka:
  topics:
    center-events: ${KAFKA_TOPIC_CENTER_EVENTS}
    audit-immutable: ${KAFKA_TOPIC_AUDIT_IMMUTABLE}

app:
  center:
    code-prefix: ${CENTER_CODE_PREFIX:NEXUS}

ai-gateway:
  base-url: ${AI_GATEWAY_BASE_URL}

resilience4j:
  circuitbreaker:
    instances:
      ai-gateway:
        sliding-window-size: ${R4J_CB_AI_WINDOW_SIZE}
        failure-rate-threshold: ${R4J_CB_AI_FAILURE_THRESHOLD}
        wait-duration-in-open-state: ${R4J_CB_AI_WAIT_DURATION}

management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_ENDPOINTS}
  metrics:
    tags:
      application: ${CENTER_SVC_NAME}
      environment: ${APP_ENVIRONMENT}
  tracing:
    sampling:
      probability: ${OTEL_SAMPLING_PROBABILITY}

otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}

logging:
  level:
    root: ${LOG_LEVEL_ROOT}
    com.edutech: ${LOG_LEVEL_APP}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
