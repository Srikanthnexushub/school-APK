spring:
  application:
    name: ${EXAM_TRACKER_SVC_NAME}
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${EXAM_TRACKER_SVC_DB_NAME}
    username: ${EXAM_TRACKER_SVC_DB_USERNAME}
    password: ${EXAM_TRACKER_SVC_DB_PASSWORD}
    hikari:
      pool-name: exam-tracker-svc-pool
      maximum-pool-size: ${EXAM_TRACKER_SVC_DB_POOL_MAX_SIZE:10}
      minimum-idle: ${EXAM_TRACKER_SVC_DB_POOL_MIN_IDLE:2}
      connection-timeout: ${EXAM_TRACKER_SVC_DB_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${EXAM_TRACKER_SVC_DB_IDLE_TIMEOUT_MS:600000}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: examtracker_schema
        jdbc:
          time_zone: UTC

  flyway:
    locations: classpath:db/migration/examtracker
    schemas: examtracker_schema
    baseline-on-migrate: false
    placeholder-replacement: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: ${REDIS_SSL_ENABLED}

server:
  port: ${EXAM_TRACKER_SVC_PORT}
  shutdown: graceful

kafka:
  topics:
    exam-events: ${KAFKA_TOPIC_EXAM_EVENTS}
    audit-immutable: ${KAFKA_TOPIC_AUDIT_IMMUTABLE}

management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_ENDPOINTS}
  metrics:
    tags:
      application: ${EXAM_TRACKER_SVC_NAME}
      environment: ${APP_ENVIRONMENT}
  tracing:
    sampling:
      probability: ${OTEL_SAMPLING_PROBABILITY}

otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}

logging:
  level:
    root: ${LOG_LEVEL_ROOT}
    com.edutech: ${LOG_LEVEL_APP}
