spring:
  application:
    name: ${AI_GATEWAY_SVC_NAME}
  threads:
    virtual:
      enabled: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: ${REDIS_SSL_ENABLED}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: ${AI_GATEWAY_SVC_KAFKA_CONSUMER_GROUP}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

server:
  port: ${AI_GATEWAY_SVC_PORT}
  shutdown: graceful

jwt:
  public-key-path: ${JWT_PUBLIC_KEY_PATH}
  issuer: ${JWT_ISSUER}

# Internal service-to-service API key (used by parent-svc, ai-mentor-svc, etc.)
service:
  api-key: ${SERVICE_API_KEY}

kafka:
  topics:
    ai-gateway-events: ${KAFKA_TOPIC_AI_GATEWAY_EVENTS}
    audit-immutable: ${KAFKA_TOPIC_AUDIT_IMMUTABLE}

# Anthropic (Claude) — primary LLM
anthropic:
  api-key: ${ANTHROPIC_API_KEY}
  model: ${ANTHROPIC_MODEL}
  base-url: ${ANTHROPIC_BASE_URL}

# OpenAI — fallback / embeddings
openai:
  api-key: ${OPENAI_API_KEY}
  embedding-model: ${AI_EMBEDDING_MODEL}

# Ollama — local LLM (dev/offline fallback)
ollama:
  base-url: ${OLLAMA_BASE_URL}

# Active LLM provider: ANTHROPIC | OPENROUTER (override via AI_DEFAULT_PROVIDER env var)
ai:
  default-provider: ${AI_DEFAULT_PROVIDER:ANTHROPIC}

# OpenRouter — OpenAI-compatible multi-model gateway
openrouter:
  api-key: ${OPENROUTER_API_KEY}
  base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai}
  model: ${OPENROUTER_MODEL:openai/gpt-4o-mini}
  connect-timeout-ms: ${OPENROUTER_CONNECT_TIMEOUT_MS:5000}
  read-timeout-ms: ${OPENROUTER_READ_TIMEOUT_MS:30000}

# Python FastAPI sidecars
sidecars:
  psych-ai:
    base-url: ${PSYCH_AI_SVC_BASE_URL}
    connect-timeout-seconds: ${PSYCH_AI_SVC_CONNECT_TIMEOUT_SECONDS}
    read-timeout-seconds: ${PSYCH_AI_SVC_READ_TIMEOUT_SECONDS}

resilience4j:
  circuitbreaker:
    instances:
      anthropic:
        sliding-window-size: ${R4J_CB_AI_WINDOW_SIZE}
        failure-rate-threshold: ${R4J_CB_AI_FAILURE_THRESHOLD}
        wait-duration-in-open-state: ${R4J_CB_AI_WAIT_DURATION}
      psych-ai-svc:
        sliding-window-size: ${R4J_CB_AI_WINDOW_SIZE}
        failure-rate-threshold: ${R4J_CB_AI_FAILURE_THRESHOLD}
        wait-duration-in-open-state: ${R4J_CB_AI_WAIT_DURATION}
  timelimiter:
    instances:
      anthropic:
        timeout-duration: ${R4J_TL_AI_TIMEOUT}

management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_ENDPOINTS}
  metrics:
    tags:
      application: ${AI_GATEWAY_SVC_NAME}
      environment: ${APP_ENVIRONMENT}
  tracing:
    sampling:
      probability: ${OTEL_SAMPLING_PROBABILITY}

otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}

logging:
  level:
    root: ${LOG_LEVEL_ROOT}
    com.edutech: ${LOG_LEVEL_APP}
