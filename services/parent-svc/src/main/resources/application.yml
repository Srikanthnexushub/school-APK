spring:
  application:
    name: ${PARENT_SVC_NAME}
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${PARENT_SVC_DB_NAME}
    username: ${PARENT_SVC_DB_USERNAME}
    password: ${PARENT_SVC_DB_PASSWORD}
    hikari:
      pool-name: parent-svc-pool
      maximum-pool-size: ${PARENT_SVC_DB_POOL_MAX_SIZE}
      minimum-idle: ${PARENT_SVC_DB_POOL_MIN_IDLE}
      connection-timeout: ${PARENT_SVC_DB_CONNECTION_TIMEOUT_MS}
      idle-timeout: ${PARENT_SVC_DB_IDLE_TIMEOUT_MS}

  jpa:
    open-in-view: false
    properties:
      hibernate:
        default_schema: parent_schema
        jdbc:
          time_zone: UTC

  flyway:
    schemas: parent_schema
    locations: classpath:db/migration/parent
    baseline-on-migrate: false
    placeholder-replacement: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: ${REDIS_SSL_ENABLED}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: ${PARENT_SVC_KAFKA_CONSUMER_GROUP}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

server:
  port: ${PARENT_SVC_PORT}
  shutdown: graceful

kafka:
  topics:
    parent-events: ${KAFKA_TOPIC_PARENT_EVENTS}
    center-events: ${KAFKA_TOPIC_CENTER_EVENTS}
    audit-immutable: ${KAFKA_TOPIC_AUDIT_IMMUTABLE}
    assess-events: ${KAFKA_TOPIC_ASSESS_EVENTS}
    notification-send: ${KAFKA_TOPIC_NOTIFICATION_SEND}

# JWT validation (public key only — parent-svc never signs tokens)
jwt:
  public-key-path: ${JWT_PUBLIC_KEY_PATH}
  issuer: ${JWT_ISSUER}

# Firebase (push notifications)
firebase:
  project-id: ${FIREBASE_PROJECT_ID}
  service-account-key-path: ${FIREBASE_SERVICE_ACCOUNT_KEY_PATH}

# AI Gateway (Parent Copilot calls routed through ai-gateway-svc)
ai-gateway:
  base-url: ${AI_GATEWAY_BASE_URL}

# Psych Svc (internal service call to fetch student psychometric data for Copilot context)
psych-svc:
  base-url: ${PSYCH_SVC_URI}

service:
  api-key: ${SERVICE_API_KEY}

# Resilience4j
resilience4j:
  circuitbreaker:
    instances:
      ai-gateway:
        sliding-window-size: ${R4J_CB_AI_WINDOW_SIZE}
        failure-rate-threshold: ${R4J_CB_AI_FAILURE_THRESHOLD}
        wait-duration-in-open-state: ${R4J_CB_AI_WAIT_DURATION}
      auth-svc:
        sliding-window-size: ${R4J_CB_AUTH_WINDOW_SIZE}
        failure-rate-threshold: ${R4J_CB_AUTH_FAILURE_THRESHOLD}
        wait-duration-in-open-state: ${R4J_CB_AUTH_WAIT_DURATION}

management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_ENDPOINTS}
  metrics:
    tags:
      application: ${PARENT_SVC_NAME}
      environment: ${APP_ENVIRONMENT}
  tracing:
    sampling:
      probability: ${OTEL_SAMPLING_PROBABILITY}

otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}

logging:
  level:
    root: ${LOG_LEVEL_ROOT}
    com.edutech: ${LOG_LEVEL_APP}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
