server:
  port: ${AI_MENTOR_SVC_PORT:8086}

spring:
  application:
    name: ai-mentor-svc
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${AI_MENTOR_DB_NAME}
    username: ${AI_MENTOR_DB_USER}
    password: ${AI_MENTOR_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: aimentor_schema
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    schemas: aimentor_schema
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: ai-mentor-svc
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

kafka:
  topics:
    study-plan-created: ${KAFKA_TOPIC_AI_MENTOR_STUDY_PLAN_CREATED}
    doubt-submitted: ${KAFKA_TOPIC_AI_MENTOR_DOUBT_SUBMITTED}
    doubt-resolved: ${KAFKA_TOPIC_AI_MENTOR_DOUBT_RESOLVED}

ai-gateway:
  base-uri: ${AI_GATEWAY_SVC_URI}
  timeout-seconds: 30

service:
  api-key: ${SERVICE_API_KEY}

management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_ENDPOINTS:health,info,prometheus,metrics}
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${APP_ENVIRONMENT:local}
  tracing:
    sampling:
      probability: ${OTEL_SAMPLING_PROBABILITY:1.0}

otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.edutech: ${LOG_LEVEL_APP:INFO}
