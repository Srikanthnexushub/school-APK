spring:
  application:
    name: ${NOTIFICATION_SVC_NAME}
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${NOTIFICATION_SVC_DB_NAME}
    username: ${NOTIFICATION_SVC_DB_USERNAME}
    password: ${NOTIFICATION_SVC_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: notification_schema
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    schemas: notification_schema
    locations: classpath:db/migration/notification
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: ${NOTIFICATION_SVC_KAFKA_CONSUMER_GROUP}
      auto-offset-reset: earliest
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: ${NOTIFICATION_SVC_PORT}

kafka:
  topics:
    notification-send: ${KAFKA_TOPIC_NOTIFICATION_SEND}

mail:
  from-address: ${MAIL_FROM_ADDRESS}
  from-name: ${MAIL_FROM_NAME}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  auth-token: ${TWILIO_AUTH_TOKEN}
  from-number: ${TWILIO_FROM_NUMBER:+15005550006}

management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_ENDPOINTS:health,info,prometheus,metrics}
  health:
    mail:
      enabled: false   # no local SMTP in dev
  metrics:
    tags:
      application: ${NOTIFICATION_SVC_NAME}
      environment: ${APP_ENVIRONMENT}
  tracing:
    sampling:
      probability: ${OTEL_SAMPLING_PROBABILITY:1.0}

otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.edutech: ${LOG_LEVEL_APP:INFO}
