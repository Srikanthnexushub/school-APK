spring:
  application:
    name: ${AUTH_SVC_NAME}
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${AUTH_SVC_DB_NAME}
    username: ${AUTH_SVC_DB_USERNAME}
    password: ${AUTH_SVC_DB_PASSWORD}
    hikari:
      pool-name: auth-svc-pool
      maximum-pool-size: ${AUTH_SVC_DB_POOL_MAX_SIZE}
      minimum-idle: ${AUTH_SVC_DB_POOL_MIN_IDLE}
      connection-timeout: ${AUTH_SVC_DB_CONNECTION_TIMEOUT_MS}
      idle-timeout: ${AUTH_SVC_DB_IDLE_TIMEOUT_MS}

  jpa:
    open-in-view: false
    properties:
      hibernate:
        default_schema: auth_schema
        jdbc:
          time_zone: UTC

  flyway:
    schemas: auth_schema
    locations: classpath:db/migration/auth
    baseline-on-migrate: false
    placeholder-replacement: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: ${REDIS_SSL_ENABLED}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
        max.block.ms: 2000
    consumer:
      group-id: ${AUTH_SVC_KAFKA_CONSUMER_GROUP}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: ${AUTH_SVC_PORT}
  shutdown: graceful
  servlet:
    context-path: /

# JWT RS256 — paths to PEM files generated by local-dev-setup.sh
jwt:
  private-key-path: ${JWT_PRIVATE_KEY_PATH}
  public-key-path: ${JWT_PUBLIC_KEY_PATH}
  access-token-expiry-seconds: ${JWT_ACCESS_TOKEN_EXPIRY_SECONDS}
  refresh-token-expiry-seconds: ${JWT_REFRESH_TOKEN_EXPIRY_SECONDS}
  issuer: ${JWT_ISSUER}

# Trusted proxy CIDRs — only these source IPs may set X-Forwarded-For
security:
  trusted-proxy-cidrs: ${TRUSTED_PROXY_CIDRS}

# Argon2id — all params externalized, no defaults (security-critical)
argon2:
  memory-cost: ${ARGON2_MEMORY_COST}
  iterations: ${ARGON2_ITERATIONS}
  parallelism: ${ARGON2_PARALLELISM}
  salt-length: ${ARGON2_SALT_LENGTH}
  hash-length: ${ARGON2_HASH_LENGTH}

# OTP (TOTP — RFC 6238)
otp:
  expiry-seconds: ${OTP_EXPIRY_SECONDS}
  max-attempts: ${OTP_MAX_ATTEMPTS}
  length: ${OTP_LENGTH}
  max-resends: ${OTP_MAX_RESENDS:3}

# hCaptcha Enterprise
captcha:
  verify-url: ${HCAPTCHA_VERIFY_URL}
  site-key: ${HCAPTCHA_SITE_KEY}
  secret-key: ${HCAPTCHA_SECRET_KEY}
  # E2E test bypass — leave empty in all non-test environments
  e2e-bypass-token: ${CAPTCHA_E2E_BYPASS_TOKEN:}

# Mail sender identity
mail:
  from-address: ${MAIL_FROM_ADDRESS}
  from-name: ${MAIL_FROM_NAME}

# Google OAuth2 — for Google Sign-In (ID token exchange)
# Set GOOGLE_OAUTH2_CLIENT_ID in .env; leave empty to disable Google Sign-In
google:
  client-id: ${GOOGLE_OAUTH2_CLIENT_ID:}

# Twilio
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  auth-token: ${TWILIO_AUTH_TOKEN}
  verify-service-sid: ${TWILIO_VERIFY_SERVICE_SID}

# Kafka topic names — no topic name hardcoded anywhere in code
kafka:
  topics:
    auth-events: ${KAFKA_TOPIC_AUTH_EVENTS}
    audit-immutable: ${KAFKA_TOPIC_AUDIT_IMMUTABLE}
    notification-send: ${KAFKA_TOPIC_NOTIFICATION_SEND}

# Resilience4j
resilience4j:
  circuitbreaker:
    instances:
      captcha-client:
        sliding-window-size: ${R4J_CB_CAPTCHA_WINDOW_SIZE}
        failure-rate-threshold: ${R4J_CB_CAPTCHA_FAILURE_THRESHOLD}
        wait-duration-in-open-state: ${R4J_CB_CAPTCHA_WAIT_DURATION}
  ratelimiter:
    instances:
      login:
        limit-for-period: ${R4J_RL_LOGIN_LIMIT}
        limit-refresh-period: ${R4J_RL_LOGIN_REFRESH_PERIOD}
        timeout-duration: ${R4J_RL_LOGIN_TIMEOUT}

# Observability
management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_ENDPOINTS}
  health:
    mail:
      enabled: false   # no local SMTP in dev — mail health always fails
  metrics:
    tags:
      application: ${AUTH_SVC_NAME}
      environment: ${APP_ENVIRONMENT}
  tracing:
    sampling:
      probability: ${OTEL_SAMPLING_PROBABILITY}

otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}

logging:
  level:
    root: ${LOG_LEVEL_ROOT}
    com.edutech: ${LOG_LEVEL_APP}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# Unverified account cleanup scheduler
auth:
  cleanup:
    cron: "0 0 * * * *"          # every hour
    retention-hours: 72

# MFA / TOTP (RFC 6238)
mfa:
  issuer: ${MFA_ISSUER:EduTech}
  pending-token-ttl-seconds: ${MFA_PENDING_TOKEN_TTL_SECONDS:300}
  reset-token-ttl-seconds: ${MFA_RESET_TOKEN_TTL_SECONDS:300}
