# ── Integration-test overrides ─────────────────────────────────────────────
# Applied when the "test" Spring profile is active.
# Testcontainers supplies the real datasource / Redis URLs via @DynamicPropertySource.
# All other mandatory properties that would fail without real infra are stubbed here.

spring:
  application:
    name: auth-svc-test

  # Prevent Spring from replacing the datasource — Testcontainers provides the real one
  # (handled by @AutoConfigureTestDatabase(replace = NONE) on the test class)

  # Hikari pool — minimal for tests
  datasource:
    hikari:
      pool-name: auth-svc-test-pool
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 5000
      idle-timeout: 30000

  jpa:
    open-in-view: false
    properties:
      hibernate:
        default_schema: auth_schema
        jdbc:
          time_zone: UTC

  flyway:
    schemas: auth_schema
    locations: classpath:db/migration/auth
    baseline-on-migrate: false
    placeholder-replacement: false

  # Redis — overridden at runtime by @DynamicPropertySource from the GenericContainer
  data:
    redis:
      ssl:
        enabled: false

  # Kafka — overridden at runtime by @DynamicPropertySource from KafkaContainer
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: auth-svc-test-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

  # Mail — point to a non-existent localhost server; SmtpNotificationAdapter catches MessagingException
  # and logs the OTP instead (safe for tests — no real email sent)
  mail:
    host: localhost
    port: 2525
    username: test
    password: test
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

server:
  port: 0   # random port — overridden by RANDOM_PORT in @SpringBootTest

# JWT — paths to keys generated by the test build and committed under src/test/resources/certs/
jwt:
  private-key-path: src/test/resources/certs/test-private-key.pem
  public-key-path: src/test/resources/certs/test-public-key.pem
  access-token-expiry-seconds: 900
  refresh-token-expiry-seconds: 86400
  issuer: auth-svc-test

# Security — no trusted proxies in tests
security:
  trusted-proxy-cidrs: []

# Argon2id — fastest valid params for unit-test speed (still correct algorithm)
argon2:
  memory-cost: 4096
  iterations: 1
  parallelism: 1
  salt-length: 16
  hash-length: 32

# OTP
otp:
  expiry-seconds: 300
  max-attempts: 5
  length: 6

# Captcha — bypass token is set so all register requests pass captcha in tests.
# Format in the request: "{bypass-token}:anything"
captcha:
  verify-url: http://localhost/captcha/verify
  site-key: test-site-key
  secret-key: test-secret-key
  e2e-bypass-token: e2e-test-bypass-secret

# Mail sender identity
mail:
  from-address: noreply@test.edutech.com
  from-name: EduTech Test

# Twilio — not used in tests
twilio:
  account-sid: dev_placeholder
  auth-token: dev_placeholder
  verify-service-sid: dev_placeholder

# Kafka topic names — must be non-empty strings for KafkaTopicProperties record
kafka:
  topics:
    auth-events: test.auth.events
    audit-immutable: test.audit.immutable
    notification-send: test.notification.send

# Resilience4j — relaxed for tests
resilience4j:
  circuitbreaker:
    instances:
      captcha-client:
        sliding-window-size: 10
        failure-rate-threshold: 100
        wait-duration-in-open-state: 1s
  ratelimiter:
    instances:
      login:
        limit-for-period: 1000
        limit-refresh-period: 1s
        timeout-duration: 0s

# Observability — minimal
management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    mail:
      enabled: false
  metrics:
    tags:
      application: auth-svc-test
      environment: test
  tracing:
    sampling:
      probability: 0.0

otel:
  exporter:
    otlp:
      endpoint: http://localhost:4317

logging:
  level:
    root: WARN
    com.edutech: DEBUG

# Disable the cleanup scheduler — tests control it directly
auth:
  cleanup:
    cron: "-"         # disabled cron expression
    retention-hours: 72
