spring:
  application:
    name: ${PSYCH_SVC_NAME}
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${PSYCH_SVC_DB_NAME}
    username: ${PSYCH_SVC_DB_USERNAME}
    password: ${PSYCH_SVC_DB_PASSWORD}
    hikari:
      pool-name: psych-svc-pool
      maximum-pool-size: ${PSYCH_SVC_DB_POOL_MAX_SIZE}
      minimum-idle: ${PSYCH_SVC_DB_POOL_MIN_IDLE}
      connection-timeout: ${PSYCH_SVC_DB_CONNECTION_TIMEOUT_MS}
      idle-timeout: ${PSYCH_SVC_DB_IDLE_TIMEOUT_MS}

  jpa:
    open-in-view: false
    properties:
      hibernate:
        default_schema: psych_schema
        jdbc:
          time_zone: UTC

  flyway:
    schemas: psych_schema
    locations: classpath:db/migration/psych
    baseline-on-migrate: false
    placeholder-replacement: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: ${REDIS_SSL_ENABLED}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: ${PSYCH_SVC_KAFKA_CONSUMER_GROUP}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

server:
  port: ${PSYCH_SVC_PORT}
  shutdown: graceful

kafka:
  topics:
    psych-events: ${KAFKA_TOPIC_PSYCH_EVENTS}
    assess-events: ${KAFKA_TOPIC_ASSESS_EVENTS}
    audit-immutable: ${KAFKA_TOPIC_AUDIT_IMMUTABLE}

jwt:
  public-key-path: ${JWT_PUBLIC_KEY_PATH}
  issuer: ${JWT_ISSUER}

service:
  api-key: ${SERVICE_API_KEY}

# Python AI sidecar (career prediction, trait embedding)
psych-ai-svc:
  base-url: ${PSYCH_AI_SVC_BASE_URL}
  connect-timeout-seconds: ${PSYCH_AI_SVC_CONNECT_TIMEOUT_SECONDS}
  read-timeout-seconds: ${PSYCH_AI_SVC_READ_TIMEOUT_SECONDS}

pgvector:
  embedding-dimensions: ${AI_EMBEDDING_DIMENSIONS}

ai-gateway:
  base-url: ${AI_GATEWAY_BASE_URL}

resilience4j:
  circuitbreaker:
    instances:
      psych-ai-svc:
        sliding-window-size: ${R4J_CB_AI_WINDOW_SIZE}
        failure-rate-threshold: ${R4J_CB_AI_FAILURE_THRESHOLD}
        wait-duration-in-open-state: ${R4J_CB_AI_WAIT_DURATION}

management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_ENDPOINTS}
  metrics:
    tags:
      application: ${PSYCH_SVC_NAME}
      environment: ${APP_ENVIRONMENT}
  tracing:
    sampling:
      probability: ${OTEL_SAMPLING_PROBABILITY}

otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}

logging:
  level:
    root: ${LOG_LEVEL_ROOT}
    com.edutech: ${LOG_LEVEL_APP}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
